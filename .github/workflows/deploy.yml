name: Desplegar BeniOptions a GitHub Pages

on:
  push:
    branches: ["main"] # Cambia a "master" si esa es tu rama principal
  workflow_dispatch:

# Configura permisos para desplegar a GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues simultáneos concurrentes
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar proyecto con Vite
        run: npm run build

      - name: Configurar entorno GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir artefacto de producción
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
