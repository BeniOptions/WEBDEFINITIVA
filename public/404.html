<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>BeniOptions</title>
  <script>
    // SPA redirect for GitHub Pages: encode the path into a query param and redirect to index
    var l = window.location;
    var pathSegments = l.pathname.split('/');
    var isGitHubPagesSubdir = l.hostname.endsWith('.github.io') && pathSegments[1] === 'WEBDEFINITIVA';
    var baseSegment = isGitHubPagesSubdir ? '/WEBDEFINITIVA' : '';
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      baseSegment +
      '/?p=' + encodeURIComponent(l.pathname + l.search) + l.hash
    );
  </script>
</head>
<body></body>
</html>
